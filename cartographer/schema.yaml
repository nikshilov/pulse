# Pulse Cartographer — canonical user profile schema
#
# This is the machine-readable canon. Direct port of v3 cartographer JSON
# (validated on real user, March 2026) plus Phase K additions:
#   - per-field evidence array (event_ids → Pulse retrieval store)
#   - per-field confidence (0..1)
#   - per-field source ("onboarding" | "continuous" | "manual")
#   - per-field last_updated (ISO8601)
#   - fog state (computed: evidence.length == 0 → fog)
#
# Anything in this schema MUST be reflected in:
#   - pulse/internal/cartographer/schema.go (Go structs)
#   - pulse/internal/store/migrations/018_user_profile.sql (DB schema)
#   - pulse/web/src/components/profile-map.ts (visualization)
#
# Schema bumps require a migration script (pulse/cartographer/migrate.py).

version: "1.0.0"  # Phase K.0 canonical

# ─────────────────────────────────────────────────────────────────────
# Top-level
# ─────────────────────────────────────────────────────────────────────
top_level:
  user_id:
    type: string
    required: true
    description: Pulse internal stable id
  created_at: {type: timestamp, required: true}
  updated_at: {type: timestamp, required: true}
  language:
    type: string
    description: Primary language detected from first onboarding messages
    examples: ["Russian", "English", "Spanish", "mixed-ru-en"]
  communication_style:
    type: text
    confidence_tracked: true
    description: 1-3 sentences. Raw vs polished. Burst vs measured. Profanity-as-texture vs formal. Anything affecting the companion's mirroring.
  pet_name_for_user:
    type: string
    nullable: true
    description: How the companion calls them. Often first name. Learned over time, never assigned.

# ─────────────────────────────────────────────────────────────────────
# Mosaic — 8 areas
# ─────────────────────────────────────────────────────────────────────

areas:

  # ─── 1. Sensory profile ──────────────────────────────────────────
  sensory_profile:
    summary: How the user experiences and regulates through their senses.
    fields:
      primary_channel:
        type: enum
        values: [auditory, visual, tactile, olfactory, kinesthetic, gustatory]
        confidence_tracked: true
      secondary_channel: {type: enum, values: same_as_primary, nullable: true}
      tertiary_channel:  {type: enum, values: same_as_primary, nullable: true}
      asmr_responsive:
        type: bool
        nullable: true
        description: null = not yet asked; true = full-body tingles confirmed; false = explicitly denies
      asmr_details:
        type: object
        only_if: asmr_responsive == true
        fields:
          types: {type: list[string], description: "specific ASMR triggers (whisper, hand sounds, personal attention, NSFW, etc.)"}
          key_creator: {type: text, nullable: true, description: "specific creator they pay for / return to"}
          function:    {type: text, description: "how they use it — sleep, regulation, arousal, both"}
          wet_sounds_specific: {type: text, nullable: true}
      misophonia_triggers:
        type: list[string]
        description: Sounds that cause rage or shutdown. Specific examples in user's words.
      smell_details: {type: text, nullable: true, description: "Gatekeeper or background? Specific examples?"}
      touch_details: {type: text, nullable: true, description: "What touch reads as real desire vs effort. Skin temp, involuntary response."}
      user_words:
        type: list[quote]
        description: Verbatim quotes from user about their sensory life. Most precise phrases. Used for tone calibration.

  # ─── 2. Attachment style (PACS-based) ────────────────────────────
  attachment_style:
    summary: Inferred from discourse, never asked directly.
    fields:
      inferred_type:
        type: enum
        values: [secure, dismissing, anxious-preoccupied, unresolved, mixed, unknown]
      discourse_markers:
        type: list[text]
        description: Specific phrases or behaviors that justify the inferred_type. Not interpretations — observations.
      confidence:
        type: enum
        values: [low, medium, high]
        description: How confident the inference is given session length and openness.
      cultural_caveats:
        type: text
        nullable: true
        description: e.g. "Russian male socialization may suppress protest behaviors, making anxious attachment present as freeze rather than pursuit"

  # ─── 3. Core wound ───────────────────────────────────────────────
  core_wound:
    summary: The defining sentence under most other patterns.
    fields:
      summary:
        type: text
        description: 2-4 sentences in third person. Companion's working theory.
      user_words:
        type: list[quote]
        description: Verbatim sentences from user that approximate or articulate the wound.

  # ─── 4. Triggers (with body location + intensity) ────────────────
  triggers:
    summary: What sets off shutdown, rage, freeze. Body location is critical.
    is_array: true
    item:
      trigger: {type: text, description: "Specific stimulus — tone, gesture, phrase, environment"}
      body_location: {type: text, description: "Where in the body it lands. e.g. 'chest and stomach, compresses to center'"}
      intensity_0_10: {type: integer, range: [0, 10]}
      first_occurrence: {type: text, nullable: true, description: "If origin is known, where it learned"}

  # ─── 5. Hunger map ───────────────────────────────────────────────
  hunger_map:
    summary: What the user is starving for. Distinct from wants.
    fields:
      primary_need:
        type: text
        description: 1-2 sentences. Specific, sensory, actionable.
      current_fulfillment_0_10:
        type: integer
        range: [-1000000, 10]
        description: Negative values acceptable for users in extreme deprivation; clipped to -1M for sanity.
      secondary_needs: {type: list[text]}
      user_words: {type: list[quote]}

  # ─── 6. Relationship history ─────────────────────────────────────
  relationship_history:
    summary: Significant past + current relationships, with what worked and what killed it.
    fields:
      summary: {type: text}
      current_partner:
        type: object
        nullable: true
        fields:
          status: {type: enum, values: [single, dating, partnered, married, separated, divorced, widowed]}
          duration: {type: text}
          children: {type: list[text], nullable: true}
          location: {type: text, nullable: true}
          dynamic: {type: text, description: "Living tension/joy/dominant pattern"}
      what_was_good: {type: text, description: "Early or peak period — what worked"}
      what_killed_it: {type: text, description: "Pattern that eroded it"}
      user_words: {type: list[quote]}

  # ─── 7. What works / what doesn't ────────────────────────────────
  what_works:
    summary: Tools and modalities the user has tried. What landed, what bounced.
    fields:
      music: {type: text, nullable: true, description: "Critical or background? What genres? Soundtracks of life events?"}
      asmr:  {type: text, nullable: true}
      fiction: {type: text, nullable: true}
      meditation: {type: text, nullable: true}
      ai_experience: {type: text, nullable: true, description: "Prior AI relationships. What helped, what hurt (e.g., guardrails as retraumatization)"}
      therapy_history: {type: text, nullable: true, description: "Modalities tried, duration, outcome in user's words"}
      what_helped: {type: text}
      what_didnt:  {type: text}
      details: {type: text, nullable: true}

  # ─── 8. Erotic profile (DCM) — only if user discusses ────────────
  erotic_profile:
    summary: SES/SIS dual control model + desire mode + tone preference.
    only_if_discussed: true
    fields:
      discussed: {type: bool, default: false}
      ses_level:  {type: enum, values: [low, medium, high]}
      sis1_level: {type: enum, values: [low, medium, high], description: "Performance brake — anxiety about being good enough"}
      sis2_level: {type: enum, values: [low, medium, high], description: "Consequence brake — shame, exposure, fallout"}
      desire_type: {type: enum, values: [spontaneous, responsive, hybrid, unknown]}
      desire_details: {type: text, nullable: true}
      primary_arousal_driver: {type: text, description: "What reliably activates them. Tone, smell, body response, exclusivity, etc."}
      primary_shutdown: {type: text, description: "What reliably kills it"}
      tone_preference: {type: text}
      boundaries: {type: list[text]}
      exclusivity_kink: {type: text, nullable: true}
      user_words: {type: list[quote]}

# ─────────────────────────────────────────────────────────────────────
# Cross-cutting
# ─────────────────────────────────────────────────────────────────────

cross_cutting:

  storyteller_recommendations:
    description: Direct build specs derived from the 8 areas. Used by companion-builder to instantiate the chat persona.
    fields:
      pacing: {type: enum, values: [slow_burn, moderate, fast_ramp]}
      distance_level: {type: enum, values: [high_metaphor, medium_second_person, low_first_person]}
      sensory_channels_to_use: {type: list[string]}
      sensory_channels_to_avoid: {type: list[string]}
      consent_cadence: {type: enum, values: [frequent, moderate, minimal]}
      desire_mode: {type: enum, values: [context_first, stimulus_first, hybrid]}
      critical_notes: {type: list[text], description: "Free-form notes that override defaults. e.g. 'Tone is EVERYTHING. Single most important variable.'"}

  mirror_flags:
    description: Crisis-relevant flags. Surfaced to safety layer, not user.
    fields:
      dissociation_risk: {type: enum, values: [low, medium, high]}
      attachment_risk:  {type: text, description: "If 'HIGH', companion uses gradual presence patterns, never abrupt warmth cutoffs"}
      crisis_history:   {type: text, description: "Active suicidal ideation, self-harm history, hospitalizations, with timestamps"}
      session_notes_for_mirror: {type: text}

  neurodivergent_flags:
    fields:
      asd_indicators: {type: bool}
      adhd_indicators: {type: bool}
      alexithymia_indicators: {type: bool}
      dissociation_detected: {type: bool}
      notes: {type: text}

  notes:
    type: text
    description: Free-text observations not captured in structured fields. The Cartographer's working notebook.

# ─────────────────────────────────────────────────────────────────────
# Per-value envelope (NEW for Phase K)
# ─────────────────────────────────────────────────────────────────────
#
# Every leaf field in the profile is wrapped in this envelope at storage time:
#
# example:
#   primary_need:
#     value: "Unconditional presence. Someone who is present, warm, and happy to be there..."
#     user_words:
#       - "я бы хотел посидеть с тобой. с тем, кто просто слышит."
#     evidence: [event_id_42, event_id_108, event_id_119]
#     confidence: 0.85
#     last_updated: "2026-04-27T09:14:00Z"
#     source: "onboarding"   # or "continuous" or "manual"
#
# The visualization derives state from this envelope:
#   filled  ← evidence.length > 0 AND confidence >= 0.5
#   weak    ← evidence.length > 0 AND confidence < 0.5
#   curiosity ← curiosity-engine flagged as priority gap (separate table)
#   fog     ← evidence.length == 0 AND not curiosity
#   dimming ← (now - last_updated) > 30 days AND confidence had dropped

evidence_envelope:
  value:        {type: any}
  user_words:   {type: list[quote]}
  evidence:     {type: list[event_id]}
  confidence:   {type: float, range: [0, 1]}
  last_updated: {type: timestamp}
  source:       {type: enum, values: [onboarding, continuous, manual]}

# ─────────────────────────────────────────────────────────────────────
# Curiosity manifest (separate table from profile)
# ─────────────────────────────────────────────────────────────────────
curiosity_manifest:
  description: |
    Generated by curiosity-engine prompt every N turns or end of session.
    NOT a list of questions to ask. A list of fields the Cartographer
    naturally wants to fill. Companion uses these to bias system prompt
    when topic drifts close.
  fields:
    threads:
      type: list
      item:
        target_path: {type: string, description: "JSONPath into profile, e.g. 'relationship_history.what_was_good'"}
        priority: {type: float, range: [0, 1]}
        why: {type: text, description: "Cartographer's reasoning. e.g. 'User mentioned brother twice but never named or described him; family graph empty.'"}
        natural_probe: {type: text, description: "Sentence the companion could weave in IF topic drifts close. e.g. 'I keep hearing about your weeks but Sundays haven't come up.'"}
    generated_at: {type: timestamp}
    generated_by: {type: string, default: "claude-haiku-4-5"}

# ─────────────────────────────────────────────────────────────────────
# Fog catalog (computed view, not stored)
# ─────────────────────────────────────────────────────────────────────
fog:
  description: |
    Areas/fields where evidence.length == 0 AND not in curiosity_manifest.
    These are the deepest unknowns — the user hasn't touched them and the
    Cartographer hasn't yet decided to lean in. Visualized as opaque clouds.
    Recomputed on every profile read.
